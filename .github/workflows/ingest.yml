# ingest.yml — nightly Tier-A IANA poll. Self-healing for Tier A, human-gated.
#
# Runs the deterministic Tier-A ingester (ingest/cli.ts on Bun) for each
# IANA-backed family. The ingester re-parses upstream, diffs against data/, and
# on DRIFT (exit 1) this job opens a PULL REQUEST with the reconciled data +
# report. It NEVER commits to main directly: drift is a reviewable change, gated
# by the deploy workflow (gates + tests) before it can merge. No drift = no PR.

name: ingest

on:
  schedule:
    - cron: "11 7 * * *" # 07:11 UTC nightly, off the hour
  workflow_dispatch:
    inputs:
      family:
        description: "Single family to ingest (default: all Tier-A families)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      # Re-parse each Tier-A family and reconcile data/ in the working tree.
      # cli.ts exits 1 on drift (not an error) — capture per-family drift, keep
      # going; the PR step turns working-tree changes into a reviewable PR.
      - name: Tier-A ingest (reconcile working tree)
        id: ingest
        run: |
          set +e
          FAMILIES="${{ github.event.inputs.family }}"
          if [ -z "$FAMILIES" ]; then
            FAMILIES="http-status http-method uri-scheme port tls-param dns-rrtype cbor-tag"
          fi
          drift=0
          for f in $FAMILIES; do
            echo "::group::ingest $f"
            bun run ingest/cli.ts --family "$f"
            code=$?
            echo "::endgroup::"
            if [ "$code" -eq 1 ]; then drift=1; fi
            if [ "$code" -gt 1 ]; then echo "ingest fatal for $f (exit $code)"; exit "$code"; fi
          done
          echo "drift=$drift" >> "$GITHUB_OUTPUT"

      - name: Gates (post-reconcile)
        if: steps.ingest.outputs.drift == '1'
        run: bun run gates

      - name: Open PR on drift
        if: steps.ingest.outputs.drift == '1'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ingest/tier-a-drift
          base: main
          commit-message: "chore(ingest): tier-A upstream drift (nightly)"
          title: "chore(ingest): tier-A upstream drift"
          body: |
            Automated nightly Tier-A reconcile detected upstream drift. The
            deterministic parser re-fetched the IANA registries, diffed against
            `data/`, and wrote the reconciled rows. The deploy gates (schema,
            provenance, tier-A shape, encoding, quorum) + tests must pass before
            merge. The ingester cannot merge or deploy on its own.
          labels: ingest, tier-a
          delete-branch: true
