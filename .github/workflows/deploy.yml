# deploy.yml — gates + tests + build, then deploy to Cloudflare Pages on push.
#
# The data-integrity gates and tests are HARD prerequisites: any failure fails
# the job and nothing deploys. `bun run build` runs prebuild (redirects) +
# `astro build`, emitting the static dist/ artifact, which wrangler deploys to
# the Cloudflare Pages project "wire". Requires the CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID secrets (Pages:Edit).

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      # DATA-INTEGRITY gates — schema, provenance, tier-A shape, encoding
      # test-vector execution, cross-source quorum. Fails the job on any failure.
      - name: Gates
        run: bun run gates

      - name: Test
        run: bun test

      - name: Build (static dist/)
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=wire --branch=main
