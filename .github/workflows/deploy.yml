# deploy.yml — gates + tests + build, then deploy to Cloudflare on push to main.
#
# The data-integrity gates and the data-integrity tests are HARD prerequisites:
# any gate or test failure fails the job and nothing is deployed. The build
# (build/build.mjs) emits the immutable dist/ artifact; wrangler-action deploys
# it to Cloudflare Workers Static Assets (see wrangler.jsonc). Requires the
# CLOUDFLARE_API_TOKEN secret (Workers Scripts:Edit + Workers Static Assets).

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One in-flight deploy at a time; let a newer push supersede an older run.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # DATA-INTEGRITY gates — schema, provenance, tier-A shape, encoding
      # test-vector execution, cross-source quorum. Fails the job on any failure.
      - name: Gates
        run: npm run gates

      - name: Test
        run: npm test

      - name: Build (dist/ artifact)
        run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # dist/ is produced by the build step; wrangler.jsonc points assets there.
          command: deploy
